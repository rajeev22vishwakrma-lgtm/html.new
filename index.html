<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindX AI Game</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #1f1c2c, #928dab);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.container {
  width: 400px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  text-align: center;
  backdrop-filter: blur(15px);
  animation: fadeIn 1s ease;
}

h1 {
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
}

#question {
  font-size: 18px;
  margin: 20px 0;
  line-height: 1.5;
}

button {
  width: 120px;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: linear-gradient(45deg, #00ff87, #60efff);
  color: black;
}

.no {
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  color: white;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

#confidence {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}

.play-again {
  margin-top: 20px;
  background: gold;
  color: black;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>🧠 MindX AI</h1>
  <p class="subtitle">I will read your mind 😈</p>

  <p id="question">Think of something... Ready?</p>

  <button class="yes" onclick="answer('yes')">Yes</button>
  <button class="no" onclick="answer('no')">No</button>

  <p id="confidence"></p>
</div>

<script>
let step = 0;
let answers = [];
let score = 0;

function answer(ans) {
  answers.push(ans);
  step++;

  if (step === 1) {
    setQ("Is it a living thing?");
  }

  else if (step === 2) {
    if (answers[0] === "yes") {
      setQ("Is it a human?");
    } else {
      setQ("Is it electronic?");
    }
  }

  else if (step === 3) {
    if (answers[1] === "yes") {
      setQ("Is it famous?");
    } else {
      setQ("Do you use it daily?");
    }
  }

  else if (step === 4) {
    guess();
  }
}

function setQ(q) {
  document.getElementById("question").innerText = q + "\n" + funnyLine();
  updateConfidence();
}

function funnyLine() {
  let lines = [
    "I'm inside your brain 🧠😈",
    "Don't lie 😏 I know it",
    "Too easy for me 😎",
    "You're trying to confuse me 😂"
  ];
  return lines[Math.floor(Math.random() * lines.length)];
}

function updateConfidence() {
  let percent = Math.floor(Math.random() * 40 + 60);
  document.getElementById("confidence").innerText =
    "Confidence: " + percent + "% 🤖";
}

function guess() {
  let result = "🤔 Hmm... ";

  if (answers[0] === "no" && answers[1] === "yes") {
    result += "It's a MOBILE PHONE 📱";
    score++;
  }
  else if (answers[0] === "yes" && answers[2] === "yes") {
    result += "It's a CELEBRITY 😎";
    score++;
  }
  else {
    result += "You tricked me 😭";
  }

  document.getElementById("question").innerText = result;
  document.getElementById("confidence").innerText = "";

  document.querySelector(".container").innerHTML += 
    `<p>Score: ${score} 🏆</p>
     <button class="play-again" onclick="location.reload()">🔁 Play Again</button>`;
}
</script>

</body>
</html>
