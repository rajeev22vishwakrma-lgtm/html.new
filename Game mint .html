<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameMint - RVplayzone</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(270deg, #000, #111, #000);
  background-size: 600% 600%;
  animation: bgMove 10s infinite;
  color: white;
  text-align: center;
}

@keyframes bgMove {
  0% {background-position:0%}
  50% {background-position:100%}
  100% {background-position:0%}
}

/* HEADER */
header {
  padding: 20px;
  border-bottom: 2px solid cyan;
}

.menu button {
  margin: 10px;
  padding: 12px 20px;
  background: linear-gradient(45deg, cyan, purple);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

.menu button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px cyan;
}

/* SECTIONS */
.section { display: none; padding: 20px; }
.active { display: block; }

/* XO */
#board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 8px;
  justify-content: center;
}

.cell {
  width: 100px;
  height: 100px;
  background: #111;
  font-size: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 10px;
}

.win {
  background: lime;
  color: black;
}

/* CAR */
canvas {
  background: black;
  border: 2px solid cyan;
}

/* TAP */
#tapBtn {
  padding: 20px;
  font-size: 20px;
  background: cyan;
  border: none;
  border-radius: 10px;
  transition: 0.2s;
}

#tapBtn:active {
  transform: scale(0.9);
}
</style>

</head>

<body>

<header>
  <h1>🎮 GameMint RVplayzone</h1>
  <h2>Welcome 🚀</h2>

  <div class="menu">
    <button onclick="show('xo')">VedantXO</button>
    <button onclick="show('car')">Khatri Racing</button>
    <button onclick="show('tap')">Amruuu Tap</button>
  </div>
</header>

<!-- XO -->

<div id="xo" class="section">
  <h2>VedantXO</h2>
  <div id="board"></div>
</div>

<!-- CAR -->

<div id="car" class="section">
  <h2>Khatri Racing 🚗</h2>
  <button onclick="startCarGame()">Start</button>
  <canvas id="game" width="400" height="500"></canvas>
</div>

<!-- TAP -->

<div id="tap" class="section">
  <h2>Amruuu Tap ⚡</h2>

  <select id="timeSelect">
    <option value="5">5 sec</option>
    <option value="10" selected>10 sec</option>
    <option value="15">15 sec</option>
  </select>

<button id="tapBtn">Start</button>

  <h2 id="tapScore">0</h2>
  <h3 id="timer">Time: 0</h3>
</div>

<script>

/* NAV */
function show(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* XO GAME */
let board = document.getElementById("board");
let cells = [];
let player = "X";

for(let i=0;i<9;i++){
  let c = document.createElement("div");
  c.classList.add("cell");
  c.onclick=()=>move(i);
  board.appendChild(c);
  cells.push(c);
}

function move(i){
  if(cells[i].innerText===""){
    cells[i].innerText=player;

    let win = checkWin();
    if(win){
      win.forEach(i=>cells[i].classList.add("win"));
      setTimeout(()=>location.reload(),1500);
    }

    player = player==="X"?"O":"X";
  }
}

function checkWin(){
  let c=[[0,1,2],[3,4,5],[6,7,8],[0,4,8],[2,4,6]];
  for(let combo of c){
    if(cells[combo[0]].innerText &&
       cells[combo[0]].innerText===cells[combo[1]].innerText &&
       cells[combo[1]].innerText===cells[combo[2]].innerText){
      return combo;
    }
  }
  return null;
}

/* TAP */
let tapBtn=document.getElementById("tapBtn");
let score=0, running=false;

tapBtn.onclick=()=>{
  let time=parseInt(document.getElementById("timeSelect").value);

  if(!running){
    running=true;
    score=0;
    tapScore.innerText=0;

    let t=time;
    timer.innerText="Time: "+t;

    let int=setInterval(()=>{
      t--;
      timer.innerText="Time: "+t;

      if(t<=0){
        clearInterval(int);
        running=false;
        alert("Score: "+score);
      }
    },1000);

  } else {
    score++;
    tapScore.innerText=score;
  }
};

/* CAR GAME */
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let car,obs=[],run=false;

document.addEventListener("keydown",e=>{
  if(!run)return;
  if(e.key==="ArrowLeft") car.x-=20;
  if(e.key==="ArrowRight") car.x+=20;
});

function startCarGame(){
  car={x:180,y:400,w:40,h:60};
  obs=[];
  run=true;

  setInterval(()=>obs.push({x:Math.random()*360,y:0}),1500);
  setInterval(draw,30);
}

function draw(){
  if(!run)return;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,400,500);

  /* ROAD LINES */
  ctx.fillStyle="white";
  for(let i=0;i<500;i+=40){
    ctx.fillRect(190,i,5,20);
  }

  ctx.fillStyle="cyan";
  ctx.fillRect(car.x,car.y,car.w,car.h);

  ctx.fillStyle="red";
  obs.forEach(o=>{
    o.y+=5;
    ctx.fillRect(o.x,o.y,40,60);

    if(car.x<o.x+40 && car.x+40>o.x && car.y<o.y+60 && car.y+60>o.y){
      run=false;
      canvas.style.background="red";
      setTimeout(()=>location.reload(),1000);
    }
  });
}

</script>

</body>
</html>
